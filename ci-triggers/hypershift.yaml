shortName: hypershift
fullName: Hypershift
repo: https://github.com/validatedpatterns-sandbox/hypershift
webHookName: ''
owners:
  - jrickard
triggers:
  branches:
  - name: main
    versions:
    - '4.22'
    - '4.21'
    - '4.20'

  openshift:
  - version: '4.22'
    branch: main
    platforms:
      - aws
    buildType: stable
    ocpTrigger: false
  - version: '4.21'
    branch: main
    platforms:
      - aws
    buildType: stable
    ocpTrigger: false
  - version: '4.20'
    branch: main
    platforms:
      - aws
    buildType: stable
    ocpTrigger: false
