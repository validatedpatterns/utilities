shortName: mcgitops
fullName: MultiCloudGitops
repo: https://github.com/validatedpatterns/multicloud-gitops
webHookName: ''
owners:
  - mbaldess
triggers:
  branches:
  - name: main
    versions:
    - '4.22'
    - '4.21'
    - '4.20'

  openshift:
  - version: '4.22'
    branch: main
    platforms:
      - aws
    buildType: stable
    ocpTrigger: true
  - version: '4.21'
    branch: main
    platforms:
      - aws
    buildType: stable
    ocpTrigger: true
  - version: '4.20'
    branch: main
    platforms:
      - azure
    buildType: stable
    ocpTrigger: true

  subscriptions:
  - name: gitops
    branch: main
  - name: rhacm
    branch: main
